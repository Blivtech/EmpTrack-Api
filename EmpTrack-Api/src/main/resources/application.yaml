spring:
  application:
    name: EmpTrack-Api
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  datasource:
    url: jdbc:mysql://13.204.139.250:3306/dev_emptrack_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: app_user
    password: "Strong@123"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB


server:
  port: 8080
  address: 0.0.0.0

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    enabled: true
    path: /v3/api-docs

logging:
  level:
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

jwt:                              # ✅ Root level — correct!
  secret: "emptrack_secret_key_must_be_32_chars_min"
  expiration: 86400000
  refresh-expiration: 604800000